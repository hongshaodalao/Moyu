<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moyu - 龙虾摸鱼</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <canvas id="game" width="960" height="540" aria-label="Moyu game canvas"></canvas>

    <div id="hud">
      <div id="topRight">
        <div class="stat">
          <div class="label">金币</div>
          <div class="value" id="goldValue">0</div>
        </div>
        <div class="stat sub">
          <div class="label">自动收益</div>
          <div class="value" id="incomeValue">+10 / 5s</div>
        </div>
      </div>

      <div id="bottomBar">
        <button id="shopBtn" class="btn">商店</button>
        <button id="saveBtn" class="btn secondary" title="手动保存">保存</button>
        <button id="resetBtn" class="btn danger" title="清空存档">重置</button>
      </div>

      <div id="gameOver" class="hidden" role="dialog" aria-modal="true">
        <div class="panelHeader">
          <div class="panelTitle">游戏结束</div>
          <div></div>
        </div>
        <div class="panelBody">
          <div id="gameOverStats" class="shopMeta"></div>
          <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:12px">
            <button id="restartBtn" class="btn">重新开始本局</button>
            <button id="closeOverBtn" class="btn secondary">关闭</button>
          </div>
        </div>
      </div>

      <div id="panel" class="hidden" role="dialog" aria-modal="true">
        <div class="panelHeader">
          <div class="panelTitle">商店</div>
          <button id="closePanelBtn" class="btn secondary">关闭</button>
        </div>
        <div class="panelBody">
          <div class="shopTabs">
            <button id="tabEconomy" class="btn">收益道具</button>
            <button id="tabCombat" class="btn secondary">战斗装备</button>
          </div>
          <div id="shopMeta" class="shopMeta"></div>
          <div id="shopList" class="shopList"></div>
          <div class="hint">
            提示：离线收益最多补 <b>2 小时</b>（防止通胀）。
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
