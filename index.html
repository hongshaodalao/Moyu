<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moyu - 龙虾摸鱼</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app" class="layout2">
    <div class="top">
      <div class="left">
        <canvas id="game" width="960" height="540" aria-label="Moyu game canvas"></canvas>
      </div>

      <aside class="right" id="sidePanel">
        <div class="sideSection">
          <div class="sideTitle">资产</div>
          <div class="row">
            <div class="k">金币</div>
            <div class="v" id="goldValue">0</div>
          </div>
          <div class="row">
            <div class="k">自动收益</div>
            <div class="v" id="incomeValue">+10 / 3s</div>
          </div>
        </div>

        <div class="sideSection">
          <div class="sideTitle">战斗状态</div>
          <div class="row"><div class="k">生命</div><div class="v" id="statHp">-</div></div>
          <div class="row"><div class="k">攻击</div><div class="v" id="statAtk">-</div></div>
          <div class="row"><div class="k">防御</div><div class="v" id="statDef">-</div></div>
          <div class="row"><div class="k">攻速</div><div class="v" id="statAps">-</div></div>
          <div class="row"><div class="k">波次/击杀</div><div class="v" id="statWave">-</div></div>
        </div>

        <div class="sideSection">
          <div class="sideTitle">装备槽</div>
          <div class="equipGrid">
            <div class="equipSlot"><div class="k">武器</div><div class="v" id="eqWeapon">无</div></div>
            <div class="equipSlot"><div class="k">护甲</div><div class="v" id="eqArmor">无</div></div>
            <div class="equipSlot"><div class="k">饰品</div><div class="v" id="eqTrinket">无</div></div>
          </div>
        </div>

        <div class="sideSection">
          <div class="sideTitle">操作</div>
          <div class="sideButtons">
            <button id="resetBtn" class="btn danger" title="清空存档">重置</button>
          </div>
          <div class="hint">离线收益最多补 <b>2 小时</b>。</div>
        </div>
      </aside>
    </div>

    <div class="bottomShop">
      <div class="sideTitle">商店</div>
      <div class="shopTabs">
        <button id="tabEconomy" class="btn">收益道具</button>
        <button id="tabCombat" class="btn secondary">战斗装备</button>
      </div>
      <div id="shopMeta" class="shopMeta"></div>
      <div class="bottomGrid">
        <div id="shopList" class="shopList"></div>
        <div id="ownedList" class="ownedList"></div>
      </div>
    </div>

    <div id="gameOver" class="hidden" role="dialog" aria-modal="true">
      <div class="panelHeader">
        <div class="panelTitle">游戏结束</div>
        <div></div>
      </div>
      <div class="panelBody">
        <div id="gameOverStats" class="shopMeta"></div>
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:12px">
          <button id="restartBtn" class="btn">重新开始本局</button>
          <button id="closeOverBtn" class="btn secondary">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
